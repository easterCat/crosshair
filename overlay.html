<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrosshairOverlay</title>
    <style>
      /* Reset all backgrounds to transparent */
      html, body {
        background: transparent !important;
        background-color: transparent !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
      }
      /* Reset everything */
      *, *::before, *::after {
        margin: 0 !important;
        padding: 0 !important;
        box-sizing: border-box !important;
        background: transparent !important;
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
      /* Container */
      #root {
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }
      /* Canvas */
      canvas {
        display: block !important;
        background: transparent !important;
        image-rendering: crisp-edges;
      }
      /* Windows WebView specific */
      _:-ms-fullscreen, :root #root {
        background: transparent !important;
      }
      /* Webkit for older browsers */
      @supports (-webkit-appearance: none) {
        body, html, #root {
          -webkit-background-composite: clear;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Set WebView2 background to transparent AFTER the window is initialized.
      // This is the most reliable place — WebView2 itself processes it.
      // We use the "initialized" event to ensure the window is fully ready.
      import { getCurrentWebviewWindow } from '@tauri-apps/api/webviewWindow';

      async function setTransparentBackground() {
        try {
          await getCurrentWebviewWindow().setBackgroundColor([0, 0, 0, 0]);
        } catch (e) {
          // Fallback: retry after short delay in case initialized fired before listener setup
          setTimeout(async () => {
            try {
              await getCurrentWebviewWindow().setBackgroundColor([0, 0, 0, 0]);
            } catch {}
          }, 200);
        }
      }

      // Listen for the initialized event (fires once when window is ready)
      getCurrentWebviewWindow().once('initialized', () => {
        setTransparentBackground();
      });

      // Also try immediately in case it's already initialized
      setTransparentBackground();
    </script>
    <script type="module" src="/src/overlay-entry.tsx"></script>
  </body>
</html>
