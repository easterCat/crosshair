<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrosshairOverlay</title>
    <style>
      /* Reset all backgrounds to transparent */
      html, body {
        background: rgba(0, 0, 0, 0) !important;
        background-color: rgba(0, 0, 0, 0) !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
      }
      /* Reset everything */
      *, *::before, *::after {
        margin: 0 !important;
        padding: 0 !important;
        box-sizing: border-box !important;
        background: rgba(0, 0, 0, 0) !important;
        background-color: rgba(0, 0, 0, 0) !important;
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
        border-style: none !important;
        border-width: 0 !important;
      }
      /* Container */
      #root {
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        background: rgba(0, 0, 0, 0) !important;
        background-color: rgba(0, 0, 0, 0) !important;
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
      }
      /* Canvas */
      canvas {
        display: block !important;
        background: rgba(0, 0, 0, 0) !important;
        background-color: rgba(0, 0, 0, 0) !important;
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
        image-rendering: crisp-edges;
      }
      /* Windows WebView specific - force transparency */
      body {
        background: rgba(0, 0, 0, 0) !important;
        background-color: rgba(0, 0, 0, 0) !important;
        -webkit-app-region: no-drag;
      }
      /* Remove any possible borders and shadows */
      * {
        border: 0 !important;
        border-style: none !important;
        border-width: 0 !important;
        outline: none !important;
        box-shadow: none !important;
        -webkit-box-shadow: none !important;
        -moz-box-shadow: none !important;
      }
      /* Force transparency for all elements */
      html, body, div, span, applet, object, iframe,
      h1, h2, h3, h4, h5, h6, p, blockquote, pre,
      a, abbr, acronym, address, big, cite, code,
      del, dfn, em, img, ins, kbd, q, s, samp,
      small, strike, strong, sub, sup, tt, var,
      b, u, i, center,
      dl, dt, dd, ol, ul, li,
      fieldset, form, label, legend,
      table, caption, tbody, tfoot, thead, tr, th, td,
      article, aside, canvas, details, embed, 
      figure, figcaption, footer, header, hgroup, 
      menu, nav, output, ruby, section, summary,
      time, mark, audio, video {
        background: rgba(0, 0, 0, 0) !important;
        background-color: rgba(0, 0, 0, 0) !important;
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
        -webkit-box-shadow: none !important;
        -moz-box-shadow: none !important;
      }
      /* Remove scrollbar */
      ::-webkit-scrollbar {
        display: none !important;
      }
      html {
        overflow: hidden !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/overlay-entry.tsx"></script>
  </body>
</html>
