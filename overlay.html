<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrosshairOverlay</title>
    <style>
      /* Reset all backgrounds to transparent */
      html, body {
        background: transparent !important;
        background-color: transparent !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        overflow: hidden !important;
      }
      /* Reset everything */
      *, *::before, *::after {
        margin: 0 !important;
        padding: 0 !important;
        box-sizing: border-box !important;
        background: transparent !important;
        background-color: transparent !important;
        border: none !important;
        box-shadow: none !important;
      }
      /* Container */
      #root {
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }
      /* Canvas */
      canvas {
        display: block !important;
        background: transparent !important;
        image-rendering: crisp-edges;
      }
      /* Windows WebView specific */
      _:-ms-fullscreen, :root #root {
        background: transparent !important;
      }
      /* Webkit for older browsers */
      @supports (-webkit-appearance: none) {
        body, html, #root {
          -webkit-background-composite: clear;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/overlay-entry.tsx"></script>
  </body>
</html>
